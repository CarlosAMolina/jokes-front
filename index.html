<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chiste diario - Suscripción</title>
  <style>
    :root{
      --bg:#f7fafc;
      --card:#ffffff;
      --accent:#0f76f0;
      --muted:#6b7280;
      --radius:12px;
      --max-width:520px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{height:100%;}
    body{
      margin:0;
      background:linear-gradient(180deg,var(--bg),#eef2f7 60%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      color:#0b1220;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .container{
      width:100%;
      max-width:var(--max-width);
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:0 6px 24px rgba(11,18,32,0.08);
      padding:28px;
      text-align:center; /* centers all text horizontally */
    }

    h1{
      margin:0 0 10px;
      font-size:1.6rem;
      letter-spacing:0.2px;
    }

    p.lead{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.45;
      font-size:1rem;
    }

    .author{
      margin:0 0 20px;
      color:var(--muted);
      font-size:0.95rem;
    }

    form{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    input[type="email"]{
      flex:1 1 260px;
      min-width:180px;
      padding:12px 14px;
      border:1px solid #e6e9ef;
      border-radius:10px;
      font-size:1rem;
      outline:none;
      transition:box-shadow .15s, border-color .15s;
    }
    input[type="email"]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(15,118,240,0.08);
    }

    button{
      -webkit-appearance:none;
      appearance:none;
      border:0;
      background:var(--accent);
      color:white;
      padding:12px 16px;
      border-radius:10px;
      font-size:1rem;
      cursor:pointer;
      min-width:128px;
      transition:transform .06s ease, box-shadow .12s;
    }
    button:active{ transform:translateY(1px); }
    button:disabled{ opacity:.6; cursor:not-allowed; }

    .note{
      margin:10px 0 0;
      color:var(--muted);
      font-size:0.9rem;
      line-height:1.3;
    }

    /* small screens: slightly increase spacing */
    @media (max-width:420px){
      .container{ padding:20px; }
      h1{ font-size:1.4rem; }
      button{ width:100%; min-width:unset; }
      input[type="email"]{ flex-basis:100%; }
      form{ gap:8px; }
    }
  </style>
</head>
<body>
  <main class="container" role="main" aria-labelledby="title">
    <h1 id="title">¡Hola! 😄</h1>

    <p class="lead">¡Suscríbete para comenzar el día con el mejor humor! De lunes a viernes recibirás un chiste. ✉️</p>
    <p class="author">Por Carlos A Molina</p>

    <form id="subscribeForm" action="#" method="post" novalidate>
      <label for="email" class="sr-only" style="position:absolute!important;left:-9999px;">Correo electrónico</label>
      <input id="email" name="email" type="email" placeholder="tu@correo.com" required autocomplete="email" />
      <button type="submit" id="submitBtn">Suscribirse</button>
    </form>

    <p class="note">Tu correo electrónico se almacenará únicamente para poder enviar los emails.</p>
  </main>

  <script>
    const form = document.getElementById('subscribeForm');
    const email = document.getElementById('email');
    const btn = document.getElementById('submitBtn');

    const ENDPOINT = "https://j729r7u7gl.execute-api.eu-south-2.amazonaws.com/subscribe"

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const value = email.value.trim();
      if (!value) {
        alert('Por favor ingresa un correo electrónico.');
        email.focus();
        return;
      }

      // Basic email pattern check
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!re.test(value)) {
        alert('Ingresa un correo válido.');
        email.focus();
        return;
      }

      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Enviando...';

      try {
        const response = await fetch(ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: value
          })
        });

        const responseText = await response.text();

        if (!response.ok) {
          throw new Error(
            responseText || `Error ${response.status}`
          );
        }
        alert('¡Gracias! Tu suscripción ha sido recibida.');
        form.reset();
      } catch (error) {
        console.error('Subscription error:', error);
        alert('No se pudo completar la suscripción. Por favor inténtalo de nuevo más tarde.');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
